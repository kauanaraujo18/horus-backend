# ==========================================
# BANCO DE DADOS (PostgreSQL)
# Em produção, definir as env vars DB_URL, DB_USERNAME e DB_PASSWORD.
# Os defaults abaixo valem apenas para desenvolvimento local.
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/horus_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:kauan}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}

# ==========================================
# SEGURANÇA / JWT
# Em produção, definir JWT_SECRET com um valor longo e aleatório (>= 32 chars).
# ==========================================
api.security.token.secret=${JWT_SECRET:dev-only-horus-local-secret-trocar-em-producao}
api.security.token.expiration-hours=${JWT_EXPIRATION_HOURS:2}

# CORS: em produção, definir CORS_ALLOWED_ORIGINS com a URL real do front.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Usuário master do painel admin (criado no boot apenas se as duas vars existirem)
admin.master.login=${ADMIN_MASTER_LOGIN:}
admin.master.senha=${ADMIN_MASTER_SENHA:}

# Upload de logo das empresas
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Porta: usa a do provedor (Render) ou 8080 local
server.port=${PORT:8080}

# Logging (DEBUG de security apenas quando explicitamente habilitado)
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}

# Não expor stacktraces/mensagens internas em respostas de erro
server.error.include-stacktrace=never
server.error.include-message=never
