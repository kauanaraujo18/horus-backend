<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horus | Sistema de Gestão Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="app-body">

    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="login-header">
                <i class="ph-fill ph-hexagon logo-icon"></i>
                <h1 class="login-title">Horus</h1>
                <p class="login-subtitle">Acesso ao Workspace</p>
            </div>
            <form id="formLogin" class="login-form" onsubmit="event.preventDefault(); realizarLoginVisual();">
                <div class="input-group">
                    <label for="loginUsuario">Usuário</label>
                    <input type="text" id="loginUsuario" placeholder="Seu usuário" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label for="loginSenha">Senha</label>
                    <input type="password" id="loginSenha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-primary btn-login-entrar">Entrar no sistema</button>
            </form>
        </div>
    </div>

    <nav class="app-sidebar">
        <div class="sidebar-brand">
            <i class="ph-fill ph-hexagon"></i>
        </div>
        <ul class="sidebar-nav">
            <li>
                <button id="caixaBtn" class="sidebar-btn" title="Frente de Caixa (PDV)">
                    <i class="ph ph-shopping-cart"></i>
                    <span>Caixa</span>
                </button>
            </li>
            <li>
                <button id="produtosBtn" class="sidebar-btn" title="Gestão de Produtos">
                    <i class="ph ph-package"></i>
                    <span>Produtos</span>
                </button>
            </li>
            <li>
                <button id="relatoriosBtn" class="sidebar-btn" title="Relatórios e Etiquetas">
                    <i class="ph ph-chart-bar"></i>
                    <span>Relatórios</span>
                </button>
            </li>
        </ul>
        <div class="sidebar-footer">
            <button class="sidebar-btn btn-logout" title="Sair do Sistema">
                <i class="ph ph-sign-out"></i>
            </button>
        </div>
    </nav>

    <main class="app-workspace">

        <div class="user-profile-badge">
            <i class="ph ph-buildings"></i>
            <span id="nomeEmpresaBadge">Carregando...</span>
            <span class="badge-divider">•</span>
            <i class="ph ph-user"></i>
            <span id="nomeUsuarioBadge">Carregando...</span>
        </div>

        <div id="produtosDiv" class="draggable window window-md" style="display: none;">
            <header class="headerjanela window-header">
                <div class="window-controls">
                    <button class="close-btn"><i class="ph ph-x"></i></button>
                </div>
                <div class="window-title-area">
                    <i id="iconeJanelaPrincipal" class="ph ph-package window-icon"></i>
                    <button id="btnVoltarProdutos" class="btn-icon btn-back" style="display: none;"><i class="ph ph-caret-left"></i></button>
                    <h2 id="tituloJanelaProdutos" class="window-title">Cadastro Geral de Produtos</h2>
                </div>
            </header>
            
            <div class="window-body">
                <div id="conteudoMenuProdutos" class="view-section">
                    <div class="menu-grid">
                        <button class="menu-card botaoJanela" id="btnNovoProduto">
                            <i class="ph ph-plus-circle"></i>
                            <span>Novo Produto</span>
                        </button>
                        <button class="menu-card botaoJanela">
                            <i class="ph ph-magnifying-glass"></i>
                            <span>Consultar Estoque</span>
                        </button>
                    </div>
                </div>

                <div id="conteudoConsultaProdutos" class="view-section" style="display: none;">
                    <div class="toolbar">
                        <div class="search-bar">
                            <i class="ph ph-magnifying-glass"></i>
                            <input type="text" id="filtroNomeProduto" placeholder="Pesquisar por nome ou código...">
                        </div>
                        <button id="btnPesquisarProduto" class="btn-secondary">Buscar</button>
                    </div>
                    
                    <div id="gridProdutosCorpo" class="cards-grid-container scrollable-box">
                        </div>
                </div>

                <div id="conteudoFormProdutos" class="view-section form-section" style="display: none;">
                    <form id="formSalvarProduto" class="standard-form">
                        <input type="hidden" id="produtoId">
                        
                        <div class="form-grid">
                            <div class="input-group col-span-1">
                                <label for="produtoCodigo">Código (EAN/SKU)</label>
                                <div class="input-with-action">
                                    <input type="text" id="produtoCodigo" readonly placeholder="Clique para gerar EAN">
                                    <i class="ph ph-barcode"></i>
                                </div>
                            </div>
                            <div class="input-group col-span-2">
                                <label for="produtoNome">Nome do Produto</label>
                                <input type="text" id="produtoNome" required placeholder="Ex: Cerveja Artesanal IPA">
                            </div>
                            <div class="input-group col-span-1">
                                <label for="produtoValor">Valor de Venda</label>
                                <input type="text" id="produtoValor" required placeholder="R$ 0,00">
                            </div>

                            <div class="input-group col-span-1">
                                <label for="produtoQuantidade">Estoque Inicial</label>
                                <input type="number" id="produtoQuantidade" min="0" required placeholder="0">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Salvar Produto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="caixaDiv" class="draggable window window-xl" style="display: none;">
            <header class="headerjanela window-header">
                <div class="window-controls">
                    <button class="close-btn"><i class="ph ph-x"></i></button>
                </div>
                <div class="window-title-area">
                    <i class="ph ph-shopping-cart window-icon"></i>
                    <h2 class="window-title">Frente de Caixa (PDV)</h2>
                </div>
            </header>

            <div class="window-body pdv-layout">
                <div class="pdv-left">
                    <div class="pdv-actions">
                        <button onclick="toggleLeitorBarras()" class="btn-secondary">
                            <i class="ph ph-barcode"></i> Leitor (F2)
                        </button>
                        <button onclick="abrirModalPesquisaParaCaixa()" class="btn-secondary">
                            <i class="ph ph-magnifying-glass"></i> Busca Manual
                        </button>
                    </div>

                    <div id="painelLeitorBarras" class="reader-panel" style="display: none;">
                        <input type="text" id="inputCodigoBarras" placeholder="Aguardando bip do leitor..." autocomplete="off">
                        <div class="reader-status"><i class="ph ph-circle-notch ph-spin"></i> Pronto para leitura</div>
                    </div>

                    <input type="hidden" id="caixaBuscaProduto">

                    <div class="table-container cart-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Produto</th>
                                    <th class="align-center">Qtd</th>
                                    <th class="align-right">Unitário</th>
                                    <th class="align-right">Total</th>
                                    <th class="align-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaCarrinho">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="pdv-right">
                    <div class="pdv-summary-card">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="lblSubtotal">R$ 0,00</span>
                        </div>
                        
                        <div class="summary-inputs">
                            <div class="input-group">
                                <label>Desconto (-)</label>
                                <input type="text" id="inputDesconto" oninput="mascaraMoeda(this)" onblur="calcularTotaisCaixa()" placeholder="R$ 0,00">
                            </div>
                            <div class="input-group">
                                <label>Acréscimo (+)</label>
                                <input type="text" id="inputAcrescimo" oninput="mascaraMoeda(this)" onblur="calcularTotaisCaixa()" placeholder="R$ 0,00">
                            </div>
                        </div>

                        <div class="summary-total">
                            <span>Total da Venda</span>
                            <span id="lblTotalFinal" class="highlight-total">R$ 0,00</span>
                        </div>
                    </div>

                    <div class="pdv-payments-card">
                        <h3 class="section-subtitle">Lançamento de Pagamentos</h3>
                        <div class="payment-grid">
                            <div class="input-group">
                                <label><i class="ph ph-money"></i> Dinheiro</label>
                                <input type="text" id="inputPagDinheiro" oninput="mascaraMoeda(this)" onblur="calcularTotaisCaixa()" placeholder="R$ 0,00">
                            </div>
                            <div class="input-group">
                                <label><i class="ph ph-pix-logo"></i> PIX</label>
                                <input type="text" id="inputPagPix" oninput="mascaraMoeda(this)" onblur="calcularTotaisCaixa()" placeholder="R$ 0,00">
                            </div>
                            <div class="input-group">
                                <label><i class="ph ph-credit-card"></i> Cartão Crédito</label>
                                <input type="text" id="inputPagCredito" oninput="mascaraMoeda(this)" onblur="calcularTotaisCaixa()" placeholder="R$ 0,00">
                            </div>
                            <div class="input-group">
                                <label><i class="ph ph-credit-card"></i> Cartão Débito</label>
                                <input type="text" id="inputPagDebito" oninput="mascaraMoeda(this)" onblur="calcularTotaisCaixa()" placeholder="R$ 0,00">
                            </div>
                            <div class="input-group col-span-2">
                                <label>Nº Parcelas (Crédito)</label>
                                <input type="number" id="inputParcelas" value="1" min="1" max="12">
                            </div>
                        </div>
                    </div>

                    <div class="pdv-balance">
                        <div class="balance-row">
                            <label>Valor Recebido:</label>
                            <input type="text" id="inputValorPago" readonly value="R$ 0,00">
                        </div>
                        <div class="balance-results">
                            <div class="result-box missing">
                                <span>Falta Pagar</span>
                                <strong id="lblAreceber">R$ 0,00</strong>
                            </div>
                            <div class="result-box change">
                                <span>Troco</span>
                                <strong id="lblTroco">R$ 0,00</strong>
                            </div>
                        </div>
                    </div>

                    <button class="btn-primary btn-checkout" onclick="finalizarVenda()">
                        <i class="ph ph-check-circle"></i> Finalizar Venda
                    </button>
                </div>
            </div>
        </div>

        <div id="relatoriosDiv" class="draggable window window-md" style="display: none;">
            <header class="headerjanela window-header">
                <div class="window-controls">
                    <button class="close-btn"><i class="ph ph-x"></i></button>
                </div>
                <div class="window-title-area">
                    <i id="iconeJanelaRelatorios" class="ph ph-chart-bar window-icon"></i>
                    <button id="btnVoltarRelatorios" class="btn-icon btn-back" style="display: none;"><i class="ph ph-caret-left"></i></button>
                    <h2 id="tituloJanelaRelatorios" class="window-title">Central de Relatórios</h2>
                </div>
            </header>

            <div class="window-body">
                <div id="conteudoMenuRelatorios" class="view-section">
                    <div class="menu-grid">
                        <button class="menu-card" id="btnGerarBarcode">
                            <i class="ph ph-barcode"></i>
                            <span>Gerar Cód. de Barras</span>
                        </button>
                        <button class="menu-card" id="btnAbrirEtiqueta">
                            <i class="ph ph-tag"></i>
                            <span>Etiquetas de Gôndola</span>
                        </button>
                        <button class="menu-card" id="btnAbrirRelVendas">
                            <i class="ph ph-trend-up"></i>
                            <span>Analítico de Vendas</span>
                        </button>
                    </div>
                </div>

                <div id="conteudoFormBarcode" class="view-section form-section" style="display: none;">
                    <form id="formBarcode" class="standard-form">
                        <div class="form-grid">
                            <div class="input-group col-span-2">
                                <label for="relatorioQtd">Quantidade de Etiquetas</label>
                                <input type="number" id="relatorioQtd" min="1" value="1" required>
                            </div>
                            <div class="input-group col-span-2">
                                <label for="relatorioPosicao">Posição Inicial na Folha (Máx 126)</label>
                                <input type="number" id="relatorioPosicao" min="1" max="126" value="1">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary"><i class="ph ph-printer"></i> Gerar PDF A4</button>
                        </div>
                    </form>
                </div>

                <div id="conteudoFormEtiqueta" class="view-section form-section" style="display: none;">
                    <form id="formEtiqueta" class="standard-form">
                        <input type="hidden" id="etiquetaIdProduto">
                        <div class="form-grid">
                            <div class="input-group col-span-2">
                                <label>Selecione o Produto</label>
                                <div class="search-trigger">
                                    <input type="text" id="displayNomeProduto" readonly placeholder="Clique na lupa para buscar" required>
                                    <button type="button" id="btnAbrirModal" class="btn-icon-inside"><i class="ph ph-magnifying-glass"></i></button>
                                </div>
                            </div>
                            <div class="input-group col-span-2">
                                <label for="etiquetaQtdCopias">Número de Cópias (Máx 320)</label>
                                <input type="number" id="etiquetaQtdCopias" min="1" max="320" value="1" required>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary"><i class="ph ph-printer"></i> Gerar Etiquetas</button>
                        </div>
                    </form>
                </div>

                <div id="conteudoFormVendas" class="view-section form-section" style="display: none;">
                    <form id="formRelatorioVendas" class="standard-form" onsubmit="event.preventDefault(); gerarRelatorioVendasPDF();">
                        <div class="form-grid">
                            <div class="input-group col-span-1">
                                <label for="relDataInicio">Data Inicial</label>
                                <input type="date" id="relDataInicio" required>
                            </div>
                            <div class="input-group col-span-1">
                                <label for="relDataFim">Data Final</label>
                                <input type="date" id="relDataFim" required>
                            </div>
                            <div class="input-group col-span-2">
                                <label for="relFormaPagamento">Forma de Pagamento</label>
                                <select id="relFormaPagamento" class="custom-select">
                                    <option value="TODAS">Todas as Formas</option>
                                    <option value="DINHEIRO">Dinheiro</option>
                                    <option value="PIX">PIX</option>
                                    <option value="CREDITO">Cartão de Crédito</option>
                                    <option value="DEBITO">Cartão de Débito</option>
                                </select>
                            </div>
                            
                            <div class="input-group col-span-2 checklist-group">
                                <div class="checklist-header">
                                    <label>Filtro por Produtos</label>
                                    <div class="checklist-actions">
                                        <button type="button" onclick="marcarTodosProdutos(true)">Todos</button>
                                        <button type="button" onclick="marcarTodosProdutos(false)">Nenhum</button>
                                    </div>
                                </div>
                                <div id="listaProdutosCheck" class="checklist-container scrollable-box">
                                    </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary"><i class="ph ph-file-pdf"></i> Gerar Relatório</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="modalPesquisa" class="spotlight-modal" style="display: none;">
        <div class="spotlight-content">
            <div class="spotlight-header">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="inputBuscaModal" placeholder="Busque um produto..." autocomplete="off">
                <button class="close-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="spotlight-body">
                <div id="listaResultadosModal" class="spotlight-results">
                    </div>
            </div>
        </div>
    </div>

    <script src = "./js/app.js"></script>

</body>
</html>
